name: Workflow security

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/**
  pull_request:
    paths:
      - .github/workflows/**
  workflow_dispatch:

permissions: {}

concurrency:
  group: workflow-security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Audit workflow files
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Audit GitHub Actions workflows
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          advanced-security: false
          online-audits: false
          version: v1.27.0
