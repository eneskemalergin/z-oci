name: CI

on:
  push:
    branches: [main, phase2-auth]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16
        run: |
          wget https://ziglang.org/builds/zig-linux-x86_64-0.16.0.tar.xz
          tar xf zig-linux-x86_64-0.16.0.tar.xz
          echo "$PWD/zig-linux-x86_64-0.16.0" >> $GITHUB_PATH

      - name: zig build test
        run: zig build test --summary all

      - name: zig build examples-smoke
        run: zig build examples-smoke

      - name: zig fmt check
        run: zig fmt --check src/ examples/ build.zig
